name: Update news hash

on:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: write

concurrency:
  group: update-news-hash
  cancel-in-progress: false

jobs:
  update-news-hash:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Recalculate news hash
        run: node scripts/update-news-hash.js

      - name: Commit updated news hash
        run: |
          if git diff --quiet -- api/v1/news.json; then
            echo "News hash is already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add api/v1/news.json
          git commit -m "Update news hash"
          git push
