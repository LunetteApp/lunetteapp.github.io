name: Update news feed

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-news-feed
  cancel-in-progress: false

jobs:
  update-news:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Build news JSON
        run: node scripts/build-news.js

      - name: Commit updated news JSON
        run: |
          if git diff --quiet -- api/v1/news.json; then
            echo "No news changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add api/v1/news.json
          git commit -m "Update news feed"
          git push

  update-news-hash:
    needs: update-news
    uses: ./.github/workflows/update-news-hash.yml
