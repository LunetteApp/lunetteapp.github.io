name: Update news feed

on:
  schedule:
    - cron: "7 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-news-feed
  cancel-in-progress: false

jobs:
  update-news:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Build news JSON
        run: node scripts/build-news.js

      - name: Check if Playwright retry needed
        id: check_playwright
        run: |
          if [ -f .playwright-needed ]; then
            echo "needed=true" >> "$GITHUB_OUTPUT"
          else
            echo "needed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Playwright Chromium (if needed)
        if: steps.check_playwright.outputs.needed == 'true'
        run: npm install playwright && npx playwright install chromium --with-deps

      - name: Retry blocked sources with Playwright
        if: steps.check_playwright.outputs.needed == 'true'
        run: node scripts/build-news.js --playwright-retry

      - name: Commit updated news JSON
        run: |
          if git diff --quiet -- api/v1/news.json; then
            echo "No news changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add api/v1/news.json
          git commit -m "Update news feed"
          git push

  update-news-hash:
    needs: update-news
    uses: ./.github/workflows/update-news-hash.yml
